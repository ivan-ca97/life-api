version: "3"

vars:
  COMPOSE: docker compose -f docker/docker-compose.yml -f env/dev.yml

tasks:
  db:up:
    desc: Start PostgreSQL
    cmds:
      - "{{.COMPOSE}} up db -d --wait"

  db:stop:
    desc: Stop PostgreSQL
    cmds:
      - "{{.COMPOSE}} stop db"

  db:reset:
    desc: Reset database (destroy data and recreate)
    cmds:
      - "{{.COMPOSE}} down -v"
      - "{{.COMPOSE}} up db -d --wait"

  db:psql:
    desc: Open psql shell
    cmds:
      - "{{.COMPOSE}} exec db psql -U life -d life"

  db:clear-hc:
    desc: Delete all Health Connect imported exercises and sync logs (dev only)
    cmds:
      - "{{.COMPOSE}} exec db psql -U life -d life -c \"DELETE FROM exercises WHERE import_source = 'health_connect'; DELETE FROM sync_logs;\""

  api:debug:
    desc: Start API with Delve debugger
    deps: [db:up]
    cmds:
      - "{{.COMPOSE}} up --build --force-recreate api-dev"

  api:up:
    desc: Start API and database in Docker
    cmds:
      - "{{.COMPOSE}} up --build -d api"

  api:down:
    desc: Stop API
    cmds:
      - "{{.COMPOSE}} down api api-dev"

  down:
    desc: Stop all Docker services
    cmds:
      - "{{.COMPOSE}} down"

  down:reset:
    desc: Stop all Docker services and destroy data
    cmds:
      - "{{.COMPOSE}} down -v"

  build:
    desc: Build all packages
    cmds:
      - go build ./...

  ai:test:
    desc: "Run the OpenAI meal-estimation integration test (reads OPENAI_API_KEY from env/dev.yml). Optional: IMAGE=path/to/photo.jpg"
    vars:
      IMAGE: '{{.IMAGE | default ""}}'
    cmds:
      - |
        KEY=$(grep -E '^[[:space:]]*OPENAI_API_KEY:' env/dev.yml | head -n1 \
          | sed -E 's/^[[:space:]]*OPENAI_API_KEY:[[:space:]]*//; s/^"//; s/"[[:space:]]*$//; s/[[:space:]]*$//' | tr -d '\r')
        if [ -z "$KEY" ]; then
          echo "OPENAI_API_KEY está vacía en env/dev.yml — pegá tu key ahí primero." >&2
          exit 1
        fi
        MODEL=$(grep -E '^[[:space:]]*OPENAI_MODEL:' env/dev.yml | head -n1 \
          | sed -E 's/^[[:space:]]*OPENAI_MODEL:[[:space:]]*//; s/^"//; s/"[[:space:]]*$//; s/[[:space:]]*$//' | tr -d '\r')
        OPENAI_API_KEY="$KEY" OPENAI_MODEL="${MODEL:-gpt-4o}" OPENAI_TEST_IMAGE="{{.IMAGE}}" \
          go test -run Integration -v ./internal/applications/meal_ai/use_case/

  setup:env:
    desc: Create dev.yml from example
    cmds:
      - cp -n env/example/dev.yml env/dev.yml
    status:
      - test -f env/dev.yml

  setup:init:
    desc: Full setup (database + env)
    cmds:
      - task: setup:env
      - task: db:up

  tunnel:up:
    desc: Start Tailscale funnel (https://ivan.tailc7ed08.ts.net → localhost:8080)
    cmds:
      - tailscale funnel --bg 8080
      - task: tunnel:health

  tunnel:health:
    desc: Check health endpoint via tunnel
    cmds:
      - curl -s https://ivan.tailc7ed08.ts.net/health
