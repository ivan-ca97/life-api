x-db-environment: &db-environment
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  POSTGRES_USER: life
  POSTGRES_PASSWORD: life
  POSTGRES_DB: life

x-api-environment: &api-environment
  <<: *db-environment
  PORT: "8080"
  CORS_ORIGINS: http://localhost:3000
  SEED_ADMIN_EMAIL: admin@life.local
  SEED_ADMIN_PASSWORD: admin123
  GOOGLE_CLIENT_ID: ""

services:
  db:
    environment:
      POSTGRES_USER: life
      POSTGRES_PASSWORD: life
      POSTGRES_DB: life

  api:
    environment:
      <<: *api-environment

  api-dev:
    environment:
      <<: *api-environment
